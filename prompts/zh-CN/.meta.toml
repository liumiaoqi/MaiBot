[behavior_scene_analyze]
display_name = "行为场景分析"
advanced = true
description = "用于将最近聊天上下文拆分为可复用的行为场景片段，并提取领域标签、行为需求和互动特征。"

[consolidate_behavior]
display_name = "行为表现整合"
advanced = true
description = "用于识别行为表现库中的语义重复条目，并输出可合并的 keeper 与 merge 方案。"

[maisaka_chat]
display_name = "规划器"
advanced = false
description = "Maisaka 主规划模板，负责整合身份、时间、工具说明和聊天上下文，驱动主循环进行思考、决策与工具调用。"

[maisaka_chat_merged_timing]
display_name = "规划器（合并时机）"
advanced = false
description = "独立时间感知关闭时使用的 Maisaka 主规划模板，将节奏控制判断合并到 Planner。"

[maisaka_replyer]
display_name = "回复"
advanced = false
description = "Maisaka 回复生成模板，负责根据人格、表达风格、群聊注意事项和待回复上下文生成最终回复。"

[default_expressor]
display_name = "改写器"
advanced = true
description = "表达方式生成与整理相关模板，通常只在调试表达系统时需要修改。"

[emoji_content_analysis]
display_name = "表情包内容分析"
advanced = true
description = "用于分析表情包图片内容的模板。"

[emoji_content_filtration]
display_name = "表情包内容过滤"
advanced = true
description = "用于判断表情包内容是否符合过滤要求的模板。"

[emoji_replace]
display_name = "表情包替换"
advanced = true
description = "用于根据文本语境选择或替换表情包的模板。"

[emoji_selection]
display_name = "表情包选择"
advanced = true
description = "用于从表情包拼图中按上下文和当前语气选择最合适表情包的模板。"

[evaluate_behavior_feedback]
display_name = "行为反馈评估"
advanced = true
description = "用于评估已采用行为是否被真实执行，以及执行后的对话结果和奖励反馈。"

[expression_evaluation]
display_name = "表达评价"
advanced = true
description = "用于评价候选表达方式质量的模板。"

[expression_select]
display_name = "表达选择"
advanced = true
description = "用于从表达库中选择合适表达方式的模板。"

[image_description]
display_name = "图片描述"
advanced = false
description = "用于将图片内容转换为文本描述的模板。"

[heuristic_memory_impression]
display_name = "记忆启发印象"
advanced = true
description = "用于根据当前聊天流和最近消息生成自然语言聊天印象，辅助长期记忆语义召回。"

[jargon_compare_inference]
display_name = "黑话对比推理"
advanced = true
description = "用于比较和推理群内黑话含义的模板。"

[jargon_explainer_summarize]
display_name = "黑话解释总结"
advanced = true
description = "用于总结黑话解释结果的模板。"

[jargon_inference_content_only]
display_name = "黑话推理"
advanced = true
description = "用于仅基于内容推理黑话含义的模板。"

[jargon_inference_with_context]
display_name = "黑话上下文推理"
advanced = true
description = "用于结合上下文推理黑话含义的模板。"

[learn_style]
display_name = "表达风格学习"
advanced = true
description = "用于从聊天内容中学习表达风格的模板。"

[learn_jargon]
display_name = "黑话学习"
advanced = true
description = "用于从真实聊天内容中抽取群内黑话候选，并交给黑话矿工更新含义和共现分布。"

[learn_behavior]
display_name = "行为表现学习"
advanced = true
description = "用于从真实聊天中抽取可复用的场景-行为-结果模式，支持观察学习和自身反馈。"

[maisaka_chat_focus]
display_name = "Focus 规划器"
advanced = true
description = "Focus 模式下的 Maisaka 规划模板，负责基于当前关注聊天和跨聊天概览选择下一步行动。"

[maisaka_timing_gate]
display_name = "时机"
advanced = true
description = "Maisaka 节奏控制模板，负责在每轮主循环前判断当前应该等待、停止，还是继续进入思考与回复流程。"

[memory_fuzzy_modify_plan]
display_name = "长期记忆模糊修改"
advanced = true
description = "用于根据用户的自然语言修改描述和候选记忆，规划失效旧记忆与写入新记忆的操作。"

[mid_term_memory_summary]
display_name = "中期聊天摘要"
advanced = true
description = "用于在上下文裁切时，将被移出的聊天记录概括成 long_summary、brief 和 keywords。"
