services:
  core:
    container_name: maim-bot-core
    #### prod ####
    image: sengokucola/maibot:latest
    #image: sengokucola/maibot:1.0.0-rc.2
    # image: infinitycat/maibot:latest
    #### dev ####
    # image: sengokucola/maibot:dev
    # image: infinitycat/maibot:dev
    entrypoint: ["/bin/sh", "/MaiMBot/docker-entrypoint-wrapper.sh"]
    environment:
      - TZ=Asia/Shanghai
      - EULA_AGREE=1b662741904d7155d1ce1c00b3530d0d
      - PRIVACY_AGREE=9943b855e72199d0f5016ea39052f1b6
      - MAIBOT_LEGACY_0X_UPGRADE_CONFIRMED=1 # Docker 无法交互确认旧版升级迁移，默认跳过确认提示
      - MAIBOT_STATISTICS_REPORT_PATH=/MaiMBot/data/maibot_statistics.html # 统计数据输出到共享目录，首次运行可自动创建文件
#      - EULA_AGREE=1b662741904d7155d1ce1c00b3530d0d # 同意EULA
#      - PRIVACY_AGREE=9943b855e72199d0f5016ea39052f1b6 # 同意EULA
    ports:
      - "18001:8001" # webui端口
      - "18121:8121" # QQ用户记忆插件WebUI端口
#      - "8000:8000"
    volumes:
      # 监听地址和端口已迁移到 ./docker-config/mmc/bot_config.toml 的 maim_message 与 webui 配置段
      - ./docker-config/mmc:/MaiMBot/config # 持久化bot配置文件
      - ./data/MaiMBot:/MaiMBot/data # 共享目录
      - ./data/MaiMBot/emoji:/data/emoji # 持久化表情包
      - ./data/MaiMBot/plugins:/MaiMBot/plugins # 插件目录
      - ./docker-entrypoint-wrapper.sh:/MaiMBot/docker-entrypoint-wrapper.sh:ro # 去重入口包装
      - ./data/MaiMBot/logs:/MaiMBot/logs # 日志目录

      - ./depends-data:/MaiMBot/depends-data # 运行时资源文件
      - site-packages:/MaiMBot/.venv # 持久化Python包（含插件依赖），镜像更新不丢失
      - hf-cache:/root/.cache/huggingface # 持久化HuggingFace模型缓存
    restart: always
    networks:
      - maim_bot

  # 启用 HTTPS 时，建议注释掉 core 服务中的 "18001:8001" 端口映射，
  # 然后取消注释此 Caddy 反向代理示例块，并按 dashboard/docs/Caddyfile.docker.example 修改域名。
  # caddy:
  #   image: caddy:2
  #   container_name: maibot-caddy
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./dashboard/docs/Caddyfile.docker.example:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - core
  #   networks:
  #     - maim_bot
  napcat:
    environment:
      - NAPCAT_UID=1000
      - NAPCAT_GID=1000
      - TZ=Asia/Shanghai
    ports:
      - "6099:6099"
    volumes:
      - ./docker-config/napcat:/app/napcat/config # 持久化napcat配置文件
      - ./data/qq:/app/.config/QQ # 持久化QQ本体
      - ./data/MaiMBot:/MaiMBot/data # 共享目录
    container_name: maim-bot-napcat
    restart: always
    image: mlikiowa/napcat-docker:latest
    networks:
      - maim_bot
  sqlite-web:
    # 注意：coleifer/sqlite-web 镜像不支持arm64
    image: coleifer/sqlite-web
    container_name: sqlite-web
    restart: always
    ports:
      - "8120:8080"
    volumes:
      - ./data/MaiMBot:/data/MaiMBot
    environment:
      - SQLITE_DATABASE=MaiMBot/MaiBot.db  # 你的数据库文件
    networks:
      - maim_bot

  # chat2db占用相对较高但是功能强大
  # 内存占用约600m，内存充足推荐选此
  # chat2db:
  #   image: chat2db/chat2db:latest
  #   container_name: maim-bot-chat2db
  #   restart: always
  #   ports:
  #     - "10824:10824"
  #   volumes:
  #     - ./data/MaiMBot:/data/MaiMBot
  #   networks:
  #     - maim_bot
  
volumes:
  site-packages:
  hf-cache:
#   caddy_data:
#   caddy_config:
networks:
  maim_bot:
    driver: bridge
